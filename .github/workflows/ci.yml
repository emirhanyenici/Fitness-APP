name: CI

# Server-side mirror of the local pre-push git hook
# (scripts/githooks/pre-push): TypeScript must type-check and the Jest
# suite must pass. Runs on every push and pull request.

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Peer-dep conflicts require --legacy-peer-deps (see MEMORY / README).
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Tests (jest)
        run: npx jest --ci --silent
